upstream nextjs {
    server app:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Security headers (ช่วย SEO ด้วย)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression (ช่วย Core Web Vitals)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/x-javascript
               application/xml application/json application/rss+xml
               font/truetype font/opentype image/svg+xml;

    # Static files — cache ยาว (Next.js ใส่ hash ให้อยู่แล้ว)
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # public folder
    location /public/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=86400";
    }

    # Main proxy to Next.js (SSR — สำคัญมากสำหรับ SEO)
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}
