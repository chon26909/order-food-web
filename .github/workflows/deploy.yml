name: Build, Push & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/order-food-web

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build Next.js image และ push ไป Docker Hub
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    environment: DEV
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Docker Compose up บน Self-hosted Runner
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy on Self-hosted
    runs-on: self-hosted
    environment: DEV
    needs: build-and-push

    steps:
      - name: Checkout code (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull latest image
        run: |
          IMAGE_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}" > .env
          echo "IMAGE_TAG=$IMAGE_TAG" >> .env
          docker pull "${{ env.DOCKER_IMAGE }}:$IMAGE_TAG"

      - name: Docker Compose up
        run: |
          docker compose up -d --remove-orphans

      - name: Clean up old images
        run: docker image prune -f
